<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - VitalSalud</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-success sticky-top">
        <div class="container">
            <a class="navbar-brand" href="../index.html">🌱 VitalSalud</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="../index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="nosotros.html">Nosotros</a></li>
                    <li class="nav-item"><a class="nav-link" href="servicios.html">Servicios</a></li>
                    <li class="nav-item"><a class="nav-link" href="galeria.html">Galería</a></li>
                    <li class="nav-item"><a class="nav-link active" href="contacto.html">Contacto</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card shadow p-4">
                    <h2 class="text-center text-success fw-bold mb-4">Formulario de Contacto</h2>
                    
                    <form id="formContacto" novalidate>
                        <div class="mb-3">
                            <label for="nombre" class="form-label font-weight-bold">Nombre Completo:</label>
                            <input type="text" class="form-control" id="nombre" placeholder="Ingresa tu nombre">
                            <div class="invalid-feedback">Por favor, escribe tu nombre completo.</div>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">Correo Electrónico:</label>
                            <input type="email" class="form-control" id="email" placeholder="ejemplo@correo.com">
                            <div class="invalid-feedback">Por favor, introduce un correo electrónico válido.</div>
                        </div>

                        <div class="mb-3">
                            <label for="mensaje" class="form-label">Mensaje o Consulta:</label>
                            <textarea class="form-control" id="mensaje" rows="4" placeholder="¿En qué podemos ayudarte?"></textarea>
                            <div class="invalid-feedback">El campo de mensaje no puede estar vacío.</div>
                        </div>

                        <button type="submit" class="btn btn-success w-100 py-2 fs-5">Enviar Mensaje</button>
                    </form>

                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-3">
        <p class="mb-0">&copy; 2026 VitalSalud. Todos los derechos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
